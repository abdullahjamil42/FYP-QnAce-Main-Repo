x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "100M"

services:
  # Judge0 CE — code execution (internal 2358)
  judge0-db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - judge0_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    <<: *default-logging
    restart: unless-stopped

  judge0-redis:
    image: redis:7.2.4
    command:
      [
        "bash",
        "-c",
        'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"',
      ]
    env_file: judge0.conf
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    <<: *default-logging
    restart: unless-stopped

  judge0:
    image: judge0/judge0:latest
    hostname: judge0
    env_file: judge0.conf
    cgroup: host
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - "2358:2358"
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=judge0-redis
      - POSTGRES_HOST=judge0-db
    <<: *default-logging
    restart: unless-stopped

  judge0-worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    env_file: judge0.conf
    cgroup: host
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
      judge0:
        condition: service_started
    environment:
      - REDIS_HOST=judge0-redis
      - POSTGRES_HOST=judge0-db
    <<: *default-logging
    restart: unless-stopped

  backend:
    build:
      context: ../server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - judge0
    environment:
      - QACE_ENV=development
      - QACE_HOST=0.0.0.0
      - QACE_PORT=8000
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - QACE_MODEL_DIR=/app/models
      - JUDGE0_API_URL=http://judge0:2358
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ../client
      dockerfile: ../infra/Dockerfile.client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_QACE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  judge0_pg_data:
